name: Blog Draft Generator

on:
  schedule:
    - cron: "0 7 * * 1,3,5"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai requests PyPDF2

      - name: Run blog generator
        run: python generate_and_publish.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit updated topics.json
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@richmondchambers.com"
          git add topics.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Mark topic as used"

          # Handle concurrent workflow runs by rebasing onto the latest remote
          # state before pushing.
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:$BRANCH"
