name: Blog Draft Generator

on:
  schedule:
    - cron: "0 7 * * 1,3,5"
  workflow_dispatch:

concurrency:
  group: blog-draft-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai requests PyPDF2

      - name: Run blog generator
        run: python generate_and_publish.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit updated topics.json
        continue-on-error: true
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@richmondchambers.com"

          BRANCH="${GITHUB_REF_NAME:-main}"
          MAX_ATTEMPTS=3
          ATTEMPTS=0

          git add topics.json
          if git diff --cached --quiet; then
            echo "No topics.json changes to commit after sync."
            exit 0
          fi

          git commit -m "Mark topic as used"

          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "Push attempt $ATTEMPTS of $MAX_ATTEMPTS"

            if git push origin "HEAD:$BRANCH"; then
              echo "Pushed topics.json update on attempt $ATTEMPTS"
              exit 0
            fi

            echo "Push rejected on attempt $ATTEMPTS; rebasing and retrying..."
            git fetch origin "$BRANCH"
            if ! git rebase "origin/$BRANCH"; then
              echo "Rebase conflict while retrying against origin/$BRANCH."
              git rebase --abort || true
              echo "Skipping topics.json push to keep successful publish run green."
              exit 0
            fi
          done

          echo "Unable to push topics.json after $MAX_ATTEMPTS attempts. Skipping failure because publish already completed."
          exit 0
