name: Blog Draft Generator

on:
  schedule:
    - cron: "0 7 * * 1,3,5"
  workflow_dispatch:

concurrency:
  group: blog-draft-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai requests PyPDF2

      - name: Run blog generator
        run: python generate_and_publish.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit updated topics.json
        continue-on-error: true
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@richmondchambers.com"

          BRANCH="${GITHUB_REF_NAME:-main}"
          MAX_ATTEMPTS=3
          ATTEMPTS=0

          git add topics.json
          if git diff --cached --quiet; then
            echo "No topics.json changes to commit after sync."
            exit 0
          fi

          git commit -m "Mark topic as used"

          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "Push attempt $ATTEMPTS of $MAX_ATTEMPTS"

            echo "Syncing local commit onto latest origin/$BRANCH before push..."
            set +e
            git fetch origin "$BRANCH"
            FETCH_STATUS=$?
            set -e
            if [ "$FETCH_STATUS" -ne 0 ]; then
              echo "Fetch failed while syncing with origin/$BRANCH; skipping topics.json push."
              exit 0
            fi

            set +e
            git rebase "origin/$BRANCH"
            REBASE_STATUS=$?
            set -e
            if [ "$REBASE_STATUS" -ne 0 ]; then
              echo "Rebase conflict while syncing against origin/$BRANCH."
              git rebase --abort || true
              echo "Skipping topics.json push to keep successful publish run green."
              exit 0
            fi

            set +e
            PUSH_OUTPUT="$(git push origin "HEAD:$BRANCH" 2>&1)"
            PUSH_STATUS=$?
            set -e
            if [ "$PUSH_STATUS" -eq 0 ]; then
              echo "Pushed topics.json update on attempt $ATTEMPTS"
              exit 0
            fi

            echo "Push rejected on attempt $ATTEMPTS; retrying after resync."
            echo "$PUSH_OUTPUT"
          done

          echo "Unable to push topics.json after $MAX_ATTEMPTS attempts. Skipping failure because publish already completed."
          exit 0
